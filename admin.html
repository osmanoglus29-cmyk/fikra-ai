<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FİKRÂ Admin</title>
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#05080f;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }.login-box {
  background:#0b1220;
  padding:30px;
  border-radius:20px;
  width:300px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

input {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#111827;
  color:#fff;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#f8d56b;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.error {
  color:#f87171;
  margin-top:10px;
  display:none;
}

  </style>
</head>
<body><div class="login-box">
  <h2>FİKRÂ Panel</h2>
  <p>Yetkisiz giriş yasak</p>  <input type="password" id="password" placeholder="Şifre gir">
  <button onclick="login()">Giriş</button>  <div class="error" id="error">Hatalı şifre</div>
</div><script>
  const PASSWORD = "fikra123"; // değiştirebilirsin

  function login(){
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");

    if(input === PASSWORD){
      window.location.href = "index.html#fikra-panel-34";
    } else {
      error.style.display = "block";
    }
  }
</script></body>
</html>
