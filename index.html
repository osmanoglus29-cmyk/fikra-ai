<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FİKRÂ | Yapay Fikir Asistanı</title>
  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(109, 40, 217, 0.18), transparent 30%),
        linear-gradient(180deg, #04070f 0%, #050a14 100%);
      color:#fff;
      text-align:center;
      min-height:100vh;
    }

    .container{
      max-width:960px;
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .top-logo{
      width:88px;
      height:88px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      margin:0 auto 14px;
      box-shadow:0 0 24px rgba(242, 204, 98, 0.22);
    }

    .assistant-img{
      width:260px;
      max-width:82%;
      display:block;
      margin:6px auto 8px;
      filter:drop-shadow(0 0 24px rgba(120, 70, 255, 0.45));
      animation:float 3.2s ease-in-out infinite;
    }

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-12px);}
      100%{transform:translateY(0);}
    }

    h1{
      margin:0;
      font-size:54px;
      letter-spacing:.5px;
    }

    .sub{
      margin:10px 0 28px;
      color:#cdd2e7;
      font-size:20px;
    }

    .input-card{
      max-width:820px;
      margin:0 auto;
      background:rgba(11, 22, 48, 0.78);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      padding:20px;
      box-shadow:0 12px 40px rgba(0,0,0,0.22);
    }

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      padding:18px;
      border:none;
      border-radius:18px;
      outline:none;
      background:#10182d;
      color:#fff;
      font-size:18px;
      line-height:1.5;
    }

    textarea::placeholder{
      color:#9aa4c7;
    }

    .btn-row{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      padding:14px 28px;
      border:none;
      border-radius:14px;
      background:#f2cc62;
      color:#111;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      transform:translateY(-1px);
    }

    .secondary{
      background:#1a2440;
      color:#fff;
      border:1px solid rgba(255,255,255,0.08);
    }

    .result{
      margin:26px auto 0;
      max-width:860px;
      background:rgba(10, 21, 46, 0.92);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      padding:26px 22px;
      text-align:left;
      box-shadow:0 14px 40px rgba(0,0,0,0.24);
    }

    .result h2{
      margin:0 0 16px;
      font-size:28px;
    }

    #idea{
      white-space:pre-line;
      line-height:1.9;
      font-size:18px;
      color:#e6e9f7;
    }

    .mini-note{
      max-width:820px;
      margin:18px auto 0;
      color:#9ea8ca;
      font-size:14px;
      line-height:1.7;
    }

    @media (max-width:700px){
      .assistant-img{
        width:300px;
        max-width:88%;
      }

      h1{
        font-size:42px;
      }

      .sub{
        font-size:18px;
      }

      textarea{
        font-size:16px;
        min-height:110px;
      }

      button{
        width:100%;
        max-width:260px;
        font-size:17px;
      }

      #idea{
        font-size:16px;
        line-height:1.8;
      }

      .result h2{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="FİKRÂ Logo" class="top-logo">

    <img src="assistant.png" alt="FİKRÂ Asistanı" class="assistant-img">

    <h1>FİKRÂ</h1>
    <p class="sub">Gerçek yapay fikir asistanı</p>

    <div class="input-card">
      <textarea
        id="mesaj"
        placeholder="Ne hakkında fikir istiyorsun? Örn: aşk, kariyer, yazılım, çocukla vakit, kişisel bakım, para, içerik üretimi..."
      ></textarea>

      <div class="btn-row">
        <button onclick="getIdea()">Fikir Ver</button>
        <button class="secondary" onclick="clearIdea()">Temizle</button>
      </div>
    </div>

    <div class="result">
      <h2>FİKRÂ öneriyor</h2>
      <div id="idea">Henüz fikir yok...</div>
    </div>

    <div class="mini-note">
      FİKRÂ yazdığın konuya göre analiz eder ve sana özel fikirler üretir.
    </div>
  </div>

  <script>
    async function getIdea() {
      const mesaj = document.getElementById("mesaj").value.trim();
      const ideaBox = document.getElementById("idea");

      if (!mesaj) {
        ideaBox.innerText = "Lütfen bir konu yaz.";
        return;
      }

      ideaBox.innerText = "FİKRÂ düşünüyor...";

      try {
        const res = await fetch("/api/fikir", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ mesaj })
        });

        const data = await res.json();

        if (!res.ok) {
          ideaBox.innerText = data?.fikir || "Bir hata oluştu.";
          return;
        }

        ideaBox.innerText = data?.fikir || "Şu anda fikir üretilemedi.";
      } catch (err) {
        ideaBox.innerText = "Hata oluştu.";
      }
    }

    function clearIdea() {
      document.getElementById("mesaj").value = "";
      document.getElementById("idea").innerText = "Henüz fikir yok...";
      document.getElementById("mesaj").focus();
    }
  </script>
</body>
  </html>
