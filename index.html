<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FİKRÂ | Yapay Fikir Asistanı</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05080f;
  color:#fff;
  text-align:center;
}
.assistant-img {
  width: 140px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.5));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}
.logo{
  width:90px;
  margin-top:30px;
}

textarea{
  width:90%;
  max-width:500px;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-top:15px;
  background:#111827;
  color:#fff;
}

button{
  padding:12px 20px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#f8d56b;
  font-weight:bold;
  cursor:pointer;
}

.card{
  background:#0b1220;
  padding:20px;
  border-radius:15px;
  margin:20px auto;
  max-width:600px;
  text-align:left;
}

#idea{
  white-space:pre-line;
  line-height:1.7;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<h1>FİKRÂ</h1>
<p>Yapay Fikir Asistanı</p>
<img src="assistant.png" class="assistant-img" />
<textarea id="input" placeholder="Ne hakkında fikir istiyorsun?"></textarea>
<br>
<button onclick="getIdea()">Fikir Ver</button>

<div class="card">
<h2>FİKRÂ öneriyor</h2>
<p id="idea">Henüz fikir yok...</p>
</div>

<script>

async function getIdea(){

const input=document.getElementById("input").value;
const ideaBox=document.getElementById("idea");

if(!input){
ideaBox.innerText="Bir şey yazman lazım.";
return;
}

ideaBox.innerText="Düşünüyor...";

try{

const res=await fetch("/api/fikir",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
mesaj:input
})
});

const data=await res.json();

ideaBox.innerText=data.fikir;

}catch(e){
ideaBox.innerText="Hata oluştu";
}

}

</script>

</body>
</html>
