<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FİKRÂ</title>

<link rel="manifest" href="/manifest.json">
<link rel="icon" href="logo.png">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#060b14;
  color:#fff;
}

.header{
  text-align:center;
  padding:15px;
}

.logo{
  width:60px;
}

textarea{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#111c34;
  color:#fff;
}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin:5px;
}

.chat{
  padding:10px;
}

.msg{
  background:#111c34;
  padding:12px;
  border-radius:12px;
  margin:10px 0;
}

.user{
  background:#23356b;
}

.tools{
  margin-top:10px;
}

.tools button{
  font-size:12px;
}

.top-buttons{
  display:flex;
  justify-content:center;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2>FİKRÂ</h2>
  <p>Yapay fikir asistanı</p>
</div>

<div class="top-buttons">
  <button onclick="openFav()">⭐ Favoriler</button>
  <button onclick="openHistory()">📜 Geçmiş</button>
</div>

<center>
<textarea id="input" placeholder="Ne hakkında fikir istiyorsun?"></textarea><br>
<button onclick="getIdea()">Fikir Ver</button>
<button onclick="getMore()">Başka Fikir</button>
<button onclick="clearChat()">Temizle</button>
</center>

<div class="chat" id="chat"></div>

<script>

let lastPrompt="";
let lastAssistantText="";

// ================= API =================

async function askAI(text){
  const res = await fetch("/api/fikir",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mesaj:text})
  });
  const data = await res.json();
  return data.fikir;
}

// ================= UI =================

function addMessage(text){
  lastAssistantText=text;

  document.getElementById("chat").innerHTML += `
  <div class="msg">
    ${text}
    <div class="tools">
      <button onclick="saveFav()">⭐ Kaydet</button>
      <button onclick="enhance('daha yaratıcı yap')">✨ Yaratıcı</button>
      <button onclick="enhance('daha sade anlat')">🧠 Sade</button>
      <button onclick="enhance('detaylandır')">📈 Geliştir</button>
      <button onclick="generateImage()">🖼 Görsel</button>
      <button onclick="shareText()">📤 Paylaş</button>
    </div>
  </div>`;
}

// ================= BUTTONS =================

async function getIdea(){
  let text=input.value;
  if(!text) return;

  lastPrompt=text;
  saveHistory(text);

  addUser(text);

  let res=await askAI(text);
  addMessage(res);
}

async function getMore(){
  if(!lastPrompt) return;

  let res=await askAI(lastPrompt+" farklı fikir üret");
  addMessage(res);
}

async function enhance(type){
  if(!lastAssistantText) return;

  let res=await askAI(lastAssistantText+" "+type);
  addMessage(res);
}

function addUser(text){
  document.getElementById("chat").innerHTML += `
  <div class="msg user">${text}</div>`;
}

// ================= FAVORITES =================

function saveFav(){
  let arr=JSON.parse(localStorage.getItem("fav")||"[]");
  arr.unshift(lastAssistantText);
  localStorage.setItem("fav",JSON.stringify(arr));
  alert("Favorilere kaydedildi");
}

function openFav(){
  let arr=JSON.parse(localStorage.getItem("fav")||"[]");

  let html=arr.map(x=>`
    <div class="msg">
      ${x}
      <button onclick="fill('${x}')">Kullan</button>
    </div>
  `).join("");

  alert("Favoriler açıldı (basit görünüm)");
  document.getElementById("chat").innerHTML=html;
}

// ================= HISTORY =================

function saveHistory(text){
  let arr=JSON.parse(localStorage.getItem("history")||"[]");
  arr.unshift(text);
  localStorage.setItem("history",JSON.stringify(arr.slice(0,10)));
}

function openHistory(){
  let arr=JSON.parse(localStorage.getItem("history")||"[]");

  let html=arr.map(x=>`
    <div class="msg">
      ${x}
      <button onclick="fill('${x}')">Yeniden sor</button>
    </div>
  `).join("");

  document.getElementById("chat").innerHTML=html;
}

// ================= SHARE =================

function shareText(){
  if(!lastAssistantText) return;

  if(navigator.share){
    navigator.share({
      title:"FİKRÂ",
      text:lastAssistantText
    });
  }else{
    navigator.clipboard.writeText(lastAssistantText);
    alert("Kopyalandı");
  }
}

// ================= IMAGE =================

function generateImage(){
  if(!lastAssistantText) return;

  const canvas=document.createElement("canvas");
  canvas.width=1080;
  canvas.height=1920;
  const ctx=canvas.getContext("2d");

  let g=ctx.createLinearGradient(0,0,0,1920);
  g.addColorStop(0,"#060b14");
  g.addColorStop(1,"#0b1730");

  ctx.fillStyle=g;
  ctx.fillRect(0,0,1080,1920);

  const img=new Image();
  img.src="logo.png";

  img.onload=()=>{
    ctx.drawImage(img,440,120,200,200);

    ctx.fillStyle="#f2cc62";
    ctx.font="bold 60px Arial";
    ctx.textAlign="center";
    ctx.fillText("FİKRÂ",540,360);

    wrapText(ctx,lastAssistantText,540,700,800,50);

    ctx.fillStyle="#888";
    ctx.fillText("fikra.app",540,1800);

    const link=document.createElement("a");
    link.download="fikra.png";
    link.href=canvas.toDataURL();
    link.click();
  }
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
  ctx.fillStyle="#fff";
  ctx.font="36px Arial";
  ctx.textAlign="center";

  let words=text.split(" ");
  let line="";

  for(let n=0;n<words.length;n++){
    let test=line+words[n]+" ";
    let w=ctx.measureText(test).width;

    if(w>maxWidth && n>0){
      ctx.fillText(line,x,y);
      line=words[n]+" ";
      y+=lineHeight;
    }else{
      line=test;
    }
  }
  ctx.fillText(line,x,y);
}

// ================= OTHER =================

function fill(text){
  input.value=text;
}

function clearChat(){
  document.getElementById("chat").innerHTML="";
}

</script>

</body>
</html>
