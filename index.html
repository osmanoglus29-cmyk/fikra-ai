<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>FİKRÂ</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#08101e">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050a15;
  color:white;
  text-align:center;
}

.logo{
  width:180px;
  margin-top:30px;
  filter:drop-shadow(0 0 25px #6d28d9);
}

.title{
  font-size:34px;
  font-weight:bold;
}

.sub{
  color:#aaa;
  margin-bottom:20px;
}

textarea{
  width:90%;
  height:80px;
  border-radius:15px;
  border:none;
  padding:15px;
  font-size:16px;
  background:#0f172a;
  color:white;
}

button{
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.main{
  background:#f2cc62;
}

.secondary{
  background:#1e293b;
  color:white;
}

.box{
  margin:20px;
  padding:20px;
  background:#0f172a;
  border-radius:15px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="title">FİKRÂ</div>
<div class="sub">Gerçek yapay fikir asistanı</div>

<textarea id="mesaj" placeholder="Ne hakkında fikir istiyorsun?"></textarea>

<br>

<button class="main" onclick="getIdea()">Fikir Ver</button>
<button class="secondary" onclick="getMore()">Başka Fikir</button>

<div class="box" id="sonuc">FİKRÂ öneriyor...</div>

<script>
let last = "";

async function getIdea(){
  let mesaj = document.getElementById("mesaj").value.trim();
  if(!mesaj) return;

  last = mesaj;

  document.getElementById("sonuc").innerText = "Düşünüyor...";

  let res = await fetch("/api/fikir",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mesaj})
  });

  let data = await res.json();
  document.getElementById("sonuc").innerText = data.fikir;
}

async function getMore(){
  if(!last) return;

  document.getElementById("sonuc").innerText = "Yeni fikirler üretiliyor...";

  let res = await fetch("/api/fikir",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mesaj:last + " farklı fikirler üret"})
  });

  let data = await res.json();
  document.getElementById("sonuc").innerText = data.fikir;
}
</script>

<!-- SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/service-worker.js');
  });
}
</script>

</body>
</html>
