<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FİKRÂ | Yapay Fikir Asistanı</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#05080f;
      color:#fff;
      text-align:center;
    }

    .container{
      max-width:900px;
      margin:0 auto;
      padding:30px 20px 60px;
    }

    .assistant-img{
      width:220px;
      max-width:70%;
      margin:10px auto 16px;
      display:block;
      filter:drop-shadow(0 0 18px rgba(138,43,226,.45));
      animation:float 3s ease-in-out infinite;
    }

    @keyframes float{
      0%{transform:translateY(0)}
      50%{transform:translateY(-10px)}
      100%{transform:translateY(0)}
    }

    h1{
      font-size:56px;
      margin:6px 0 10px;
    }

    p.sub{
      margin:0 0 26px;
      color:#cfcfe6;
      font-size:22px;
    }

    textarea{
      width:100%;
      max-width:760px;
      min-height:120px;
      padding:18px;
      border:none;
      border-radius:18px;
      outline:none;
      background:#10182d;
      color:#fff;
      font-size:18px;
      box-sizing:border-box;
    }

    button{
      margin-top:16px;
      padding:14px 28px;
      border:none;
      border-radius:14px;
      background:#f2cc62;
      color:#111;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }

    .result{
      margin:28px auto 0;
      max-width:820px;
      background:#0b1630;
      border-radius:22px;
      padding:26px;
      text-align:left;
      box-sizing:border-box;
    }

    .result h2{
      margin-top:0;
      font-size:24px;
    }

    #idea{
      white-space:pre-line;
      line-height:1.8;
      font-size:18px;
      color:#e7e7f3;
    }

    @media (max-width:600px){
      .assistant-img{
        width:260px;
        max-width:78%;
      }

      h1{
        font-size:44px;
      }

      p.sub{
        font-size:18px;
      }

      textarea{
        font-size:16px;
      }

      #idea{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="assistant.png" alt="FİKRÂ Asistanı" class="assistant-img">

    <h1>FİKRÂ</h1>
    <p class="sub">Yapay Fikir Asistanı</p>

    <textarea id="mesaj" placeholder="Ne hakkında fikir istiyorsun?"></textarea>
    <br>
    <button onclick="getIdea()">Fikir Ver</button>

    <div class="result">
      <h2>FİKRÂ öneriyor</h2>
      <div id="idea">Henüz fikir yok...</div>
    </div>
  </div>

  <script>
    async function getIdea() {
      const mesaj = document.getElementById("mesaj").value.trim();
      const ideaBox = document.getElementById("idea");

      if (!mesaj) {
        ideaBox.innerText = "Lütfen bir konu yaz.";
        return;
      }

      ideaBox.innerText = "FİKRÂ düşünüyor...";

      try {
        const res = await fetch("/api/fikir", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ mesaj })
        });

        const data = await res.json();
        ideaBox.innerText = data.fikir || "Bir cevap alınamadı.";
      } catch (err) {
        ideaBox.innerText = "Hata oluştu.";
      }
    }
  </script>
</body>
</html>
